# Grape Agent Configuration Example
# 
# Configuration File Locations (in priority order):
# 1) grape_agent/config/config.yaml - Development mode (current directory)
# 2) ~/.grape-agent/config/config.yaml - User config directory
# 3) <package>/grape_agent/config/config.yaml - Package installation directory
#
# To use this config:
# - Copy this file to one of the above locations as config.yaml
# - Fill in your API key and customize settings as needed
# - All config files (config.yaml, mcp.json, system_prompt.md) are in the same directory

# ===== LLM Configuration =====
# MiniMax API Configuration
# MiniMax provides both global and China platforms:
# - Global: https://platform.minimax.io -> api_base: https://api.minimax.io
# - China: https://platform.minimaxi.com -> api_base: https://api.minimaxi.com
# Please choose based on your network environment and get API key from corresponding platform
api_key: "YOUR_API_KEY_HERE"  # Replace with your MiniMax API Key
api_base: "https://api.minimax.io"   # Global users (default)
# api_base: "https://api.minimaxi.com"  # China users
model: "MiniMax-M2.5"
# LLM provider: "anthropic" or "openai"
# For MiniMax API, the suffix (/anthropic or /v1) is auto-appended based on provider.
# For third-party APIs (e.g., https://api.siliconflow.cn/v1), api_base is used as-is.
provider: "anthropic"  # Default: anthropic

# Model-native web search (OpenAI protocol models)
# For models like GLM-5 that support native search, this lets model call built-in search
# directly instead of relying on MCP web search tools.
# Note:
# - OpenAI-compatible endpoint: injects {"type":"web_search","web_search":...}
# - Anthropic-compatible endpoint: auto-maps to server tool "web_search_20250305"
native_web_search:
  enabled: true
  model_patterns: ["glm-5"]
  tool_type: "web_search"
  web_search:
    enable: "True"

# ===== Retry Configuration =====
retry:
  enabled: true           # Enable retry mechanism
  max_retries: 3          # Maximum number of retries
  initial_delay: 1.0      # Initial delay time (seconds)
  max_delay: 60.0         # Maximum delay time (seconds)
  exponential_base: 2.0   # Exponential backoff base (delay = initial_delay * base^attempt)

# ===== Agent Configuration =====
max_steps: 100  # Maximum execution steps
workspace_dir: "./workspace"  # Working directory
system_prompt_path: "system_prompt.md"  # System prompt file (same config directory)

# ===== Multi-Agent Profiles (M3) =====
agents:
  default_agent_id: "main"
  profiles:
    main:
      # Optional overrides; omitted means use top-level model/system_prompt/workspace.
      # workspace: "./workspace-main"
      # model: "GLM-5"
      # system_prompt_path: "system_prompt.md"
    # reviewer:
    #   workspace: "./workspace-reviewer"
    #   model: "GLM-5"
    #   system_prompt_path: "system_prompt_reviewer.md"

# ===== Routing Rules (M3) =====
routing:
  default_agent_id: "main"
  rules:
    # First-match wins (ordered)
    # - channel: "feishu"
    #   chat_type: "group"     # direct|group
    #   chat_id: "oc_xxx"
    #   account_id: "cli_xxx"
    #   agent_id: "reviewer"

# ===== Subagent Policy (M4) =====
subagents:
  enabled: true
  max_depth: 2
  deny_tools_leaf:
    - "sessions_spawn"
    - "sessions_list"
    - "sessions_history"
    - "sessions_send"

# ===== Terminal UI =====
# style: legacy | compact | claude
ui:
  style: "claude"
  show_thinking: true
  show_tool_args: false
  show_timing: false
  show_steps: false
  render_markdown: true

# ===== Tools Configuration =====
tools:
  # Basic tool switches
  enable_file_tools: true  # File read/write/edit tools (ReadTool, WriteTool, EditTool)
  enable_bash: true        # Bash command execution tool
  enable_note: true        # Session note tool (SessionNoteTool)
  
  # Claude Skills
  enable_skills: true      # Enable Skills
  skills_dir: "./skills"   # Skills directory path
  
  # MCP Tools
  enable_mcp: true         # Enable MCP tools
  mcp_config_path: "mcp.json"  # MCP configuration file (same config directory)
                           # Note: API Keys for MCP tools are configured in mcp.json
  # MCP timeout configuration (prevents hanging on network issues)
  mcp:
    connect_timeout: 10.0    # Connection timeout in seconds (default: 10)
    execute_timeout: 60.0    # Tool execution timeout in seconds (default: 60)
    sse_read_timeout: 120.0  # SSE read timeout in seconds (default: 120)

# ===== Channel Plugins (M2) =====
# Channel runtime will auto-start enabled plugins and stop them on process exit.
channels:
  feishu:
    enabled: false
    default_account: "main"
    accounts:
      main:
        app_id: "cli_xxx"
        app_secret: "YOUR_FEISHU_APP_SECRET"
        domain: "feishu"  # feishu (CN) or lark (global)
      # ops:
      #   app_id: "cli_ops_xxx"
      #   app_secret: "YOUR_FEISHU_APP_SECRET_OPS"
      #   domain: "lark"
    render_mode: "auto"  # auto|raw|card
    policy:
      require_mention: true         # for group chats
      reply_in_thread: true         # reply in topic/thread when possible
      group_session_scope: "group"  # group|group_sender|topic
    streaming:
      enabled: false          # progressive chunk streaming
      chunk_size: 600         # 100-3000 chars per chunk
      interval_ms: 120        # delay between chunk sends
      reply_all_chunks: false # true: all chunks via reply API
      progress_ping_sec: 0    # default off: avoid repeated "still processing" messages
      progress_card_enabled: true    # default on: one updatable progress card
      progress_card_start_sec: 5     # create card only when execution exceeds this duration
      progress_card_update_sec: 3    # refresh card interval
      progress_card_tail_lines: 5    # only keep latest N progress lines
    # Optional: custom workspace base for Feishu chat sessions
    # workspace_base: "~/.grape-agent/feishu_workspaces"

# ===== Cron Scheduler (M5) =====
cron:
  enabled: false
  store_path: "~/.grape-agent/cron/jobs.json"
  poll_interval_sec: 5.0
  max_concurrency: 2
  default_timeout_sec: 300

# ===== Webterm Local Bridge (Chrome 插件适配) =====
webterm_bridge:
  enabled: false
  host: "127.0.0.1"
  port: 8766
  token: "CHANGE_ME_WEBTERM_BRIDGE_TOKEN"
  # Optional override; default follows gateway.host/gateway.port/gateway.auth.token
  # gateway_host: "127.0.0.1"
  # gateway_port: 8765
  # gateway_token: "grape-agent-gateway-dev-token"
  gateway_client_id: "webterm-bridge"
  # Parent session for creating webterm child sessions via sessions.spawn
  parent_session_key: "agent:main:terminal:main"
  default_agent_id: "main"
  max_buffer_lines: 400
  max_context_chars: 12000
  command_wrap_markers: true
  command_require_confirm: true
  auto_execute_low_risk: false
  profile_path: "~/.grape-agent/webterm_profiles.yaml"
  command_allowlist: ["grep", "tail", "cat", "less", "awk", "sed", "journalctl", "kubectl", "ps", "top", "netstat", "ss", "curl", "ls", "find"]
  command_denylist: ["rm", "reboot", "shutdown", "mkfs", "userdel", "iptables", "poweroff", "init"]

# ===== MemOS Cloud Memory (Optional) =====
# MemOS provides cloud-based long-term memory for AI agents.
# Features: semantic search, multi-agent memory sharing, 72% token reduction.
# Get your API key at: https://memos-dashboard.openmem.net
#
# Installation (requires fastapi<0.116.0, may conflict with other deps):
#   pip install MemoryOS
#
memos:
  enabled: false
  api_key: ""  # Your MemOS API key (e.g., mpg-xxx)
  # Optional explicit conversation scope override (default: derived from channel/session)
  conversation_id: ""
  # Optional query prefix to improve recall quality
  query_prefix: ""

  # Automatic lifecycle memory (recommended)
  auto_recall_enabled: true
  auto_add_enabled: true
  add_include_assistant: true
  add_async_mode: true
  add_throttle_sec: 0.0

  # Recall tuning
  recall_memory_limit_number: 6
  recall_preference_limit_number: 4
  recall_include_preference: true
  recall_include_tool_memory: false
  recall_tool_memory_limit_number: 4
  recall_max_items: 8
  recall_max_item_chars: 220
  recall_min_relativity: 0.0

  # Metadata
  source: "grape-agent"
  tags: []

# ===== Gateway Control Plane (Optional) =====
# Local TCP JSON line protocol:
#   one request per line: {"id":"1","method":"health","params":{},"auth":{"token":"...","client_id":"x","role":"operator"}}
gateway:
  enabled: false
  host: "127.0.0.1"
  port: 8765
  auth:
    enabled: true
    token: "CHANGE_ME_TO_A_STRONG_TOKEN"
