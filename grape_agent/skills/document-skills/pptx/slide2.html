<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F2F2F2; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1C2833;
  padding: 15pt 40pt;
}
h1 {
  color: #FFFFFF;
  font-size: 28pt;
  margin: 0;
}
.content {
  padding: 20pt 40pt 40pt 40pt;
  flex: 1;
  display: flex;
  gap: 25pt;
}
.left-col {
  flex: 1;
}
.right-col {
  flex: 1;
}
.section-title {
  background: #FFFFFF;
  padding: 8pt 15pt;
  margin-bottom: 12pt;
  border-left: 5pt solid #F96D00;
}
h2 {
  color: #1C2833;
  font-size: 17pt;
  margin: 0;
}
.stat-box {
  background: #FFFFFF;
  padding: 15pt;
  margin-bottom: 10pt;
  border-radius: 8pt;
}
.stat-number {
  color: #F96D00;
  font-size: 30pt;
  font-weight: bold;
  margin: 0;
}
.stat-label {
  color: #2E4053;
  font-size: 12pt;
  margin: 4pt 0 0 0;
}
.trend-list {
  background: #FFFFFF;
  padding: 15pt;
  border-radius: 8pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>市场分析</h1>
</div>
<div class="content">
  <div class="left-col">
    <div class="section-title">
      <h2>市场规模</h2>
    </div>
    <div class="stat-box">
      <p class="stat-number">¥12.5万亿</p>
      <p class="stat-label">2026年零售市场规模</p>
    </div>
    <div class="stat-box">
      <p class="stat-number">+18.5%</p>
      <p class="stat-label">年增长率</p>
    </div>
  </div>
  <div class="right-col">
    <div class="section-title">
      <h2>市场趋势</h2>
    </div>
    <div class="trend-list">
      <ul>
        <li>线上线下深度融合</li>
        <li>AI驱动的个性化推荐</li>
        <li>社交电商持续增长</li>
        <li>绿色消费意识提升</li>
        <li>即时配送需求增加</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
