<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #1C2833; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
}
.end-box {
  text-align: center;
  padding: 40pt;
}
h1 {
  color: #FFFFFF;
  font-size: 48pt;
  margin: 0 0 30pt 0;
}
.accent-line {
  width: 100pt;
  height: 4pt;
  background: #F96D00;
  margin: 0 auto 30pt auto;
}
.contact-info {
  color: #AAB7B8;
  font-size: 16pt;
  margin: 0 0 10pt 0;
}
.email {
  color: #F96D00;
  font-size: 18pt;
  margin: 20pt 0 0 0;
}
.slogan {
  color: #FFFFFF;
  font-size: 20pt;
  margin: 30pt 0 0 0;
  font-style: italic;
}
</style>
</head>
<body>
<div class="end-box">
  <h1>感谢聆听</h1>
  <div class="accent-line"></div>
  <p class="contact-info">营销策划团队</p>
  <p class="email">contact@smartretail.com</p>
  <p class="slogan">携手共创智慧零售新时代</p>
</div>
</body>
</html>
