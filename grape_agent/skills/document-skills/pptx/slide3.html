<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #F2F2F2; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1C2833;
  padding: 15pt 40pt;
}
h1 {
  color: #FFFFFF;
  font-size: 28pt;
  margin: 0;
}
.content {
  padding: 20pt 40pt 40pt 40pt;
  flex: 1;
  display: flex;
  gap: 18pt;
}
.persona-card {
  flex: 1;
  background: #FFFFFF;
  padding: 20pt;
  border-radius: 8pt;
  border-top: 4pt solid #F96D00;
}
.persona-icon {
  width: 50pt;
  height: 50pt;
  background: #1C2833;
  border-radius: 50%;
  margin: 0 auto 12pt auto;
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-text {
  color: #F96D00;
  font-size: 24pt;
  font-weight: bold;
  margin: 0;
  text-align: center;
}
h2 {
  color: #1C2833;
  font-size: 15pt;
  margin: 0 0 8pt 0;
  text-align: center;
}
.persona-desc {
  color: #2E4053;
  font-size: 11pt;
  margin: 0 0 10pt 0;
  text-align: center;
}
.traits {
  border-top: 2pt solid #F2F2F2;
  padding-top: 10pt;
  margin-top: 8pt;
}
</style>
</head>
<body>
<div class="header">
  <h1>目标受众分析</h1>
</div>
<div class="content">
  <div class="persona-card">
    <div class="persona-icon">
      <p class="icon-text">Y</p>
    </div>
    <h2>年轻都市白领</h2>
    <p class="persona-desc">25-35岁，追求品质与效率</p>
    <div class="traits">
      <ul>
        <li>收入稳定，消费力强</li>
        <li>注重工作生活平衡</li>
        <li>习惯线上购物</li>
        <li>重视品牌价值</li>
      </ul>
    </div>
  </div>
  <div class="persona-card">
    <div class="persona-icon">
      <p class="icon-text">Z</p>
    </div>
    <h2>Z世代消费者</h2>
    <p class="persona-desc">18-24岁，追求个性与体验</p>
    <div class="traits">
      <ul>
        <li>乐于分享与表达</li>
        <li>注重社交属性</li>
        <li>偏好短视频平台</li>
        <li>重视可持续性</li>
      </ul>
    </div>
  </div>
  <div class="persona-card">
    <div class="persona-icon">
      <p class="icon-text">F</p>
    </div>
    <h2>新中产家庭</h2>
    <p class="persona-desc">30-45岁，注重健康与品质</p>
    <div class="traits">
      <ul>
        <li>关注产品安全性</li>
        <li>重视服务质量</li>
        <li>偏好会员制购物</li>
        <li>时间价值导向</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
