<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grape-Agent Webterm</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main>
    <h1>Grape-Agent Webterm</h1>

    <section class="card">
      <h2>自动会话</h2>
      <button id="rotateSession">刷新会话</button>
      <div id="sessionStatus" class="status"></div>
    </section>

    <section class="card">
      <h2>提示词配置</h2>
      <label>模板切换</label>
      <select id="templateSelect"></select>
      <button id="toggleTemplateEdit">编辑模板</button>

      <div id="templateEditor" class="hidden">
        <label>模板名称</label>
        <input id="templateName" placeholder="例如：日志排障-生产环境" />
        <button id="createTemplate">新建模板</button>
        <button id="updateTemplate">保存到当前模板</button>
        <button id="deleteTemplate">删除当前模板</button>

        <label>日志基础路径（支持多行）</label>
        <textarea id="logBasePath" rows="3" placeholder="/app/backup/applog/neutral-crowd-service/hzhg-zlg-k8s-public1"></textarea>

        <label>输出格式要求</label>
        <textarea id="outputFormat" rows="3" placeholder="例如：先给结论，再给命令，再给风险级别"></textarea>

        <label>补充提示词（支持 txt）</label>
        <textarea id="customPrompt" rows="6" placeholder="可填写业务背景、日志规则、排障偏好"></textarea>
        <input id="promptFile" type="file" accept=".txt,text/plain" />
      </div>
      <div id="promptStatus" class="status"></div>
    </section>

    <section class="card">
      <h2>对话</h2>
      <label>用户输入</label>
      <textarea id="userInput" rows="10" placeholder="把你在终端看到的日志片段和问题描述粘贴到这里"></textarea>
      <button id="askAgent">发送给 Agent</button>

      <label>Agent 输出</label>
      <textarea id="agentOutput" rows="20" readonly></textarea>

      <div id="ioStatus" class="status"></div>
    </section>
  </main>
  <script type="module" src="./sidepanel.js"></script>
</body>
</html>
