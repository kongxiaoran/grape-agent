name: Build Grape-Agent Binaries (PyInstaller)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "grape-agent"
        type: choice
        options:
          - grape-agent
          - all
  push:
    tags:
      - "pyi-v*"

jobs:
  build:
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Sync dependencies (Python 3.10)
        run: uv sync --python 3.10

      - name: Build selected binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.target || 'grape-agent' }}"

          build_one() {
            local output_name="$1"
            local entry_file="$2"
            uv run --python 3.10 --with pyinstaller pyinstaller \
              --noconfirm --clean --onefile \
              --name "${output_name}" \
              --collect-submodules mini_agent \
              --collect-data mini_agent \
              --collect-submodules memos \
              --collect-data memos \
              --collect-submodules lark_oapi \
              --collect-submodules python_socks \
              "${entry_file}"
          }

          build_one "grape-agent" "mini_agent/cli.py"
          if [[ "$TARGET" == "all" ]]; then
            build_one "grape-agent-feishu" "mini_agent/feishu/server_ws.py"
            build_one "grape-agent-webterm-bridge" "mini_agent/webterm_bridge/server.py"
          fi

      - name: Build selected binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $target = "${{ github.event.inputs.target || 'grape-agent' }}"

          function Build-One([string]$outputName, [string]$entryFile) {
            uv run --python 3.10 --with pyinstaller pyinstaller `
              --noconfirm --clean --onefile `
              --name $outputName `
              --collect-submodules mini_agent `
              --collect-data mini_agent `
              --collect-submodules memos `
              --collect-data memos `
              --collect-submodules lark_oapi `
              --collect-submodules python_socks `
              $entryFile
          }

          Build-One "grape-agent" "mini_agent/cli.py"
          if ($target -eq "all") {
            Build-One "grape-agent-feishu" "mini_agent/feishu/server_ws.py"
            Build-One "grape-agent-webterm-bridge" "mini_agent/webterm_bridge/server.py"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grape-agent-pyinstaller-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
