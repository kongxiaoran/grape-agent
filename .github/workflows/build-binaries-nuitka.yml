name: Build Grape-Agent Binaries (Nuitka)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target"
        required: true
        default: "grape-agent"
        type: choice
        options:
          - grape-agent
  push:
    tags:
      - "v*"

jobs:
  build:
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python 3.10
        run: uv python install 3.10

      - name: Sync dependencies (Python 3.10)
        run: uv sync --python 3.10

      - name: Build selected binaries (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          build_one() {
            local output_name="$1"
            local entry_file="$2"
            uv run --python 3.10 --with "nuitka[onefile]" --with zstandard python -m nuitka \
              --onefile \
              --assume-yes-for-downloads \
              --follow-imports \
              --include-package=grape_agent \
              --include-package-data=grape_agent \
              --include-package=memos \
              --include-package-data=memos \
              --include-package=lark_oapi \
              --enable-plugin=dill-compat \
              --noinclude-setuptools-mode=nofollow \
              --noinclude-pytest-mode=nofollow \
              --noinclude-unittest-mode=nofollow \
              --noinclude-pydoc-mode=nofollow \
              --noinclude-IPython-mode=nofollow \
              --noinclude-dask-mode=nofollow \
              --noinclude-numba-mode=nofollow \
              --lto=no \
              --jobs=4 \
              --output-dir=dist \
              --output-filename="${output_name}" \
              "${entry_file}"
          }

          build_one "grape-agent" "grape_agent/cli.py"

      - name: Build selected binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          function Build-One([string]$outputName, [string]$entryFile) {
            uv run --python 3.10 --with "nuitka[onefile]" --with zstandard python -m nuitka `
              --onefile `
              --assume-yes-for-downloads `
              --follow-imports `
              --include-package=grape_agent `
              --include-package-data=grape_agent `
              --include-package=memos `
              --include-package-data=memos `
              --include-package=lark_oapi `
              --enable-plugin=dill-compat `
              --noinclude-setuptools-mode=nofollow `
              --noinclude-pytest-mode=nofollow `
              --noinclude-unittest-mode=nofollow `
              --noinclude-pydoc-mode=nofollow `
              --noinclude-IPython-mode=nofollow `
              --noinclude-dask-mode=nofollow `
              --noinclude-numba-mode=nofollow `
              --lto=no `
              --jobs=4 `
              --output-dir=dist `
              --output-filename=$outputName `
              $entryFile
          }

          Build-One "grape-agent.exe" "grape_agent/cli.py"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grape-agent-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
